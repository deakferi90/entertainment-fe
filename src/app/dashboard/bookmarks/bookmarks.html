<div class="movies-container">
  <input
    type="text"
    id="first_name"
    (input)="filterText.set($any($event.target).value)"
    class="bg-neutral-secondary-medium border border-white text-heading text-white text-sm rounded-base focus:ring-brand focus:border-brand block px-3 py-2.5 shadow-xs placeholder:text-body w-4/5"
    placeholder="Search for movies"
    required
  />
  <h1 class="text-white text-3xl mt-[20px] mb-[20px]">Bookmarked Movies</h1>
  <div class="h-[1080px] grid grid-cols-3 gap-[70px] overflow-y-auto scrollbar">
    @if (displayBookmarkedItems().length > 0) {
      @for (item of displayBookmarkedItems(); track $index; let i = $index) {
        <div class="relative w-[328px] h-[220px]">
          <div
            class="bookmark-container cursor-pointer"
            (click)="toggleBookmark(item)"
          >
            <svg
              (click)="onSelect(item)"
              class="h-8 transition-colors duration-200 absolute top-2.5 right-2.5"
              viewBox="0 0 20 22"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <g transform="translate(0,3)">
                <path
                  d="M14.6094 0C14.7491 0 14.8828 0.0277594 15.0104 0.0832783C15.2109 0.163472 15.3704 0.289932 15.4889 0.462657C15.6074 0.635382 15.6667 0.826614 15.6667 1.03635V12.9636C15.6667 13.1734 15.6074 13.3646 15.4889 13.5373C15.3704 13.7101 15.2109 13.8365 15.0104 13.9167C14.895 13.9661 14.7613 13.9907 14.6094 13.9907C14.3177 13.9907 14.0655 13.892 13.8529 13.6946L9.83333 9.77132L5.8138 13.6946C5.59505 13.8982 5.34288 14 5.05729 14C4.91753 14 4.78385 13.9722 4.65625 13.9167C4.45573 13.8365 4.29622 13.7101 4.17773 13.5373C4.05924 13.3646 4 13.1734 4 12.9636V1.03635C4 0.826614 4.05924 0.635382 4.17773 0.462657C4.29622 0.289932 4.45573 0.163472 4.65625 0.0832783C4.78385 0.0277594 4.91753 0 5.05729 0H14.6094Z"
                  [attr.fill]="
                    bookmarkedItems()[item.title] ? 'white' : 'transparent'
                  "
                />
                <path
                  d="M5.05762 0.75H14.6094C14.6466 0.75 14.6782 0.757236 14.7109 0.771484L14.7217 0.775391L14.7314 0.779297C14.7986 0.806159 14.8383 0.840442 14.8701 0.886719C14.9028 0.934311 14.917 0.977751 14.917 1.03613V12.9639C14.917 13.0222 14.9028 13.0657 14.8701 13.1133C14.8383 13.1596 14.7986 13.1938 14.7314 13.2207L14.7236 13.2236L14.7158 13.2275C14.7109 13.2296 14.6807 13.2412 14.6094 13.2412C14.5318 13.2412 14.4733 13.225 14.418 13.1885L14.3633 13.1445L10.3574 9.23438L9.83301 8.72363L9.30957 9.23438L5.30273 13.1455C5.21581 13.2264 5.14401 13.2499 5.05762 13.25C5.02036 13.25 4.98786 13.2428 4.95508 13.2285L4.94531 13.2246L4.93457 13.2207L4.85254 13.1738C4.83024 13.1562 4.81185 13.1365 4.7959 13.1133C4.76325 13.0657 4.75003 13.0222 4.75 12.9639V1.03613C4.75003 0.977751 4.76325 0.934311 4.7959 0.886719C4.82775 0.840293 4.86727 0.806216 4.93457 0.779297L4.94531 0.775391L4.95508 0.771484C4.98786 0.757223 5.02036 0.75 5.05762 0.75Z"
                  stroke="white"
                  stroke-width="1.5"
                  fill="none"
                  [attr.fill]="
                    bookmarkedItems()[item.title] ? 'white' : 'transparent'
                  "
                />
              </g>
            </svg>
          </div>

          <img [src]="item.thumbnail.regular.small" alt="movie-image" />
          <div class="flex items-center mt-[10px] text-gray-300 text-sm">
            <span>{{ item.year }}</span>
            <span class="mx-2">•</span>
            <span>{{ item.category }}</span>
            <span class="mx-2">•</span>
            <span>{{ item.rating }}</span>
          </div>
          <h2 class="text-2xl text-white">
            {{ item.title }}
          </h2>
        </div>
      }
    } @else {
      <h1 class="text-white">No Bookmarked Movies or Series were found !</h1>
    }
  </div>
</div>
