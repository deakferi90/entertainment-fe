<div class="flex gap-[30px]">
  <div class="menu-wrapper-container flex items-center justify-center">
    <div class="menu-wrapper flex flex-col justify-between">
      <div
        class="inner-menu-nav flex items-center flex-col gap-10 justify-center"
      >
        <img
          [src]="movieImg"
          class="mt-[30px] mb-[30px] pointer-events-none"
          alt="movie image"
        />
        @for (item of menuItems; track $index) {
          <ng-container>
            <a [routerLink]="[item.route]">
              <img
                [class.active]="selectedMenu === item.label"
                [src]="item.imgSrc"
                [alt]="item.alt"
              />
            </a>
          </ng-container>
        }
      </div>
      <div class="grid justify-center mb-[30px]">
        <img [src]="profile" alt="person" />
      </div>
    </div>
  </div>

  <div class="dashboard-content">
    <router-outlet></router-outlet>
  </div>
</div>
